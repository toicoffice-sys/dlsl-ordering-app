<script>
// ============================================================
// GreenBite — Scripts.html
// SPA client logic: routing, state, API calls
// ============================================================

var App = (() => {
  // ---- State ----
  let state = {
    token: null, user: null, role: null, stallData: null,
    cart: [],
    favorites: [],
    view: 'login', subview: null,
    concessionaires: [], products: [], orders: [],
    currentStall: null, selectedOrder: null,
    pendingEmail: null, pendingName: null
  };

  // ---- Persist token ----
  function loadToken()  { return localStorage.getItem('dlsl_ordering_token'); }
  function saveToken(t) { localStorage.setItem('dlsl_ordering_token', t); }
  function clearToken() { localStorage.removeItem('dlsl_ordering_token'); }

  // ---- Persist last view (session restore) ----
  const _NO_RESTORE = new Set(['login','order-detail','stall','cart']);
  function saveLastView(view) {
    if (!_NO_RESTORE.has(view)) {
      try { localStorage.setItem('dlsl_last_view', view); } catch(e) {}
    }
  }
  function loadLastView()   { return localStorage.getItem('dlsl_last_view') || 'home'; }
  function clearLastView()  { localStorage.removeItem('dlsl_last_view'); }

  // ---- Persist cart ----
  function saveCart()  { try { localStorage.setItem('dlsl_cart', JSON.stringify(state.cart)); } catch(e) {} }
  function loadCart()  { try { const c = localStorage.getItem('dlsl_cart'); return c ? JSON.parse(c) : []; } catch(e) { return []; } }

  // ---- Persist favorites ----
  function saveFavorites()  { try { localStorage.setItem('dlsl_favorites', JSON.stringify(state.favorites)); } catch(e) {} }
  function loadFavorites()  { try { const f = localStorage.getItem('dlsl_favorites'); return f ? JSON.parse(f) : []; } catch(e) { return []; } }

  // ---- GAS caller ----
  function call(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        [fn](...args);
    });
  }

  // ---- Toast ----
  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ---- Show/hide pages ----
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = document.getElementById('page-' + id);
    if (el) el.classList.add('active');
  }

  // ---- Modals ----
  function openModal(id) { document.getElementById(id)?.classList.add('open'); }
  function closeModal(id){ document.getElementById(id)?.classList.remove('open'); }

  // ---- Loading overlay ----
  function setLoading(el, loading) {
    if (!el) return;
    if (loading) { el._orig = el.innerHTML; el.disabled = true; el.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>'; }
    else         { el.disabled = false; el.innerHTML = el._orig || ''; }
  }

  // ---- Format ----
  function peso(n) { return '₱' + Number(n).toFixed(2); }
  function relTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    const diff = Date.now() - d;
    if (diff < 60000)    return 'Just now';
    if (diff < 3600000)  return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return d.toLocaleDateString('en-PH', { month:'short', day:'numeric' });
  }
  function fmtDateTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString('en-PH', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit', hour12:true });
  }
  function statusBadge(s) {
    const labels = { pending:'Pending', confirmed:'Confirmed', preparing:'Preparing',
                     ready:'Ready', completed:'Completed', cancelled:'Cancelled',
                     approved:'Approved', rejected:'Rejected' };
    return `<span class="badge badge-${s}">${labels[s]||s}</span>`;
  }
  function stars(n, max=5) {
    return Array.from({length:max}, (_,i) => `<span style="color:${i<n?'#C9A84C':'#e0e0e0'}">★</span>`).join('');
  }

  // ================================================================
  // AUTH
  // ================================================================

  function initLoginListeners() {
    var submitBtn = document.getElementById('login-submit-btn');
    var emailInp  = document.getElementById('login-email');
    var backBtn   = document.getElementById('otp-back-btn');
    var otpSubmit = document.getElementById('otp-submit-btn');
    var resendBtn = document.getElementById('resend-btn');
    if (submitBtn) submitBtn.addEventListener('click', submitEmail);
    if (emailInp)  emailInp.addEventListener('keydown', function(e){ if(e.key==='Enter') submitEmail(); });
    if (backBtn)   backBtn.addEventListener('click', function() { renderLoginStep1(); });
    if (otpSubmit) otpSubmit.addEventListener('click', function() { submitOTP(state.pendingEmail); });
    if (resendBtn) resendBtn.addEventListener('click', function() { resendOTP(state.pendingEmail, state.pendingName); });
    setupOTPInputs();
  }

  async function init() {
    const t = loadToken();
    if (t) {
      try {
        const res = await call('getBootData', t);
        if (res.success) {
          state.token = t;
          bootSession(res);
          return;
        }
      } catch {}
      clearToken();
    }
    showPage('login');
    renderLoginStep1();
  }

  function bootSession(res) {
    state.user = res.user;
    state.role = res.role;
    state.stallData = res.stallData;
    state.concessionaires = res.concessionaires || [];
    state.cart      = loadCart();
    state.favorites = loadFavorites();
    const nameEl = document.getElementById('topnav-username');
    if (nameEl) {
      if (res.role === 'concessionaire' && res.stallData?.StallName) {
        nameEl.innerHTML = `${res.stallData.StallName} <span style="font-size:10px;background:var(--gold);color:var(--g900);padding:2px 7px;border-radius:10px;font-weight:700;vertical-align:middle;margin-left:4px;">CONCESSIONAIRE</span>`;
      } else if (res.role === 'admin') {
        nameEl.innerHTML = `${(res.user.name || '').split(' ')[0]} <span style="font-size:10px;background:#C8A951;color:#1A3A5C;padding:2px 7px;border-radius:10px;font-weight:700;vertical-align:middle;margin-left:4px;">ADMIN</span>`;
      } else {
        nameEl.textContent = (res.user.name || '').split(' ')[0];
      }
    }
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('bottom-nav').style.display = 'block';
    document.getElementById('app-footer').style.display = 'block';
    const isCustomer = !['admin','concessionaire'].includes(res.role);
    if (!isCustomer) {
      document.getElementById('topnav-cart').style.display = 'none';
    }
    // Hide Track My Order from menu for admin/concessionaire
    const trackBtn = document.getElementById('menu-track-btn');
    if (trackBtn) trackBtn.style.display = isCustomer ? '' : 'none';
    const favBtn = document.querySelector('#user-dropdown-menu button[onclick*="favorites"]');
    if (favBtn) favBtn.style.display = isCustomer ? '' : 'none';
    updateCartBadge();
    setupNavForRole(res.role);
    const restoredView = loadLastView();
    navigateTo(restoredView);
  }

  // Step 1 — show email step, hide OTP step
  function renderLoginStep1(error) {
    var step1 = document.getElementById('login-step1');
    var step2 = document.getElementById('login-step2');
    var errEl = document.getElementById('login-error');
    if (step1) step1.style.display = '';
    if (step2) step2.style.display = 'none';
    if (errEl) {
      if (error) { errEl.textContent = error; errEl.style.display = ''; }
      else        { errEl.style.display = 'none'; }
    }
    var inp = document.getElementById('login-email');
    if (inp) inp.focus();
  }

  // Step 2 — show OTP step, hide email step
  function renderLoginStep2(email, name, error) {
    state.pendingEmail = email;
    state.pendingName  = name;
    var step1 = document.getElementById('login-step1');
    var step2 = document.getElementById('login-step2');
    var emailDisplay = document.getElementById('otp-email-display');
    var errEl = document.getElementById('otp-error');
    if (step1) step1.style.display = 'none';
    if (step2) step2.style.display = '';
    if (emailDisplay) emailDisplay.textContent = email;
    if (errEl) {
      if (error) { errEl.textContent = error; errEl.style.display = ''; }
      else        { errEl.style.display = 'none'; }
    }
    for (var i = 0; i < 6; i++) {
      var el = document.getElementById('otp-' + i);
      if (el) el.value = '';
    }
    var first = document.getElementById('otp-0');
    if (first) first.focus();
  }

  function setupOTPInputs() {
    for (var i = 0; i < 6; i++) {
      (function(idx) {
        var el = document.getElementById('otp-' + idx);
        if (!el) return;
        el.addEventListener('input', function(e) {
          e.target.value = e.target.value.replace(/\D/g,'').slice(0,1);
          if (e.target.value && idx < 5) { var n = document.getElementById('otp-'+(idx+1)); if(n) n.focus(); }
        });
        el.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !e.target.value && idx > 0) { var p = document.getElementById('otp-'+(idx-1)); if(p) p.focus(); }
        });
        el.addEventListener('paste', function(e) {
          e.preventDefault();
          var digits = (e.clipboardData.getData('text').replace(/\D/g,'')).slice(0,6);
          digits.split('').forEach(function(d,j){ var inp=document.getElementById('otp-'+j); if(inp) inp.value=d; });
          var last = document.getElementById('otp-'+Math.min(digits.length,5)); if(last) last.focus();
        });
      })(i);
    }
    var first = document.getElementById('otp-0'); if(first) first.focus();
  }

  async function submitEmail() {
    var email = (document.getElementById('login-email')||{}).value;
    email = (email||'').trim();
    if (!email) { toast('Please enter your email.','error'); return; }
    var btn = document.getElementById('login-submit-btn');
    if (btn) { btn.disabled=true; btn.textContent='Sending…'; }
    try {
      var res = await call('requestAccess', email);
      if (res.success) { renderLoginStep2(email, res.name); }
      else { toast(res.error, 'error'); renderLoginStep1(res.error); }
    } catch(e) { toast('Connection error. Please try again.', 'error'); renderLoginStep1('Connection error. Please try again.'); }
    finally { if(btn){btn.disabled=false; btn.textContent='Generate OTP →';} }
  }

  async function submitOTP(email) {
    var code = [0,1,2,3,4,5].map(function(i){ var el=document.getElementById('otp-'+i); return el?el.value:''; }).join('');
    if (code.length < 6) { toast('Enter all 6 digits.','error'); return; }
    var btn = document.getElementById('otp-submit-btn');
    if (btn) { btn.disabled=true; btn.textContent='Verifying…'; }
    try {
      var res = await call('verifyOTP', email, code);
      if (res.success) {
        saveToken(res.token);
        state.token = res.token;
        bootSession(res);
      } else {
        renderLoginStep2(email, '', res.error);
      }
    } catch(e) { toast('Connection error. Please try again.','error'); }
    finally { if(btn){btn.disabled=false; btn.textContent='Verify & Sign In';} }
  }

  async function resendOTP(email, name) {
    var btn = document.getElementById('resend-btn');
    if (btn) { btn.disabled=true; btn.textContent='Sending...'; }
    try {
      var res = await call('resendOTP', email);
      if (res.success) { toast('New OTP sent!','success'); renderLoginStep2(email, name||res.name); }
      else { toast(res.error,'error'); }
    } catch(e) { toast('Connection error.','error'); }
    finally { if(btn){btn.disabled=false; btn.textContent='Resend OTP';} }
  }

  async function doLogout() {
    if (state.token) await call('logout', state.token).catch(()=>{});
    localStorage.removeItem('dlsl_cart');
    clearLastView();
    state = { token:null, user:null, role:null, stallData:null, cart:[], favorites:[], view:'login', subview:null, concessionaires:[], products:[], orders:[], currentStall:null, selectedOrder:null, pendingEmail:null, pendingName:null };
    clearToken();
    document.getElementById('main-nav').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    document.getElementById('app-footer').style.display = 'none';
    document.getElementById('topnav-cart').style.display = '';
    closeUserMenu();
    showPage('login');
    renderLoginStep1();
  }

  // ---- User dropdown ----
  function toggleUserMenu() {
    document.getElementById('user-dropdown-menu').classList.toggle('open');
  }
  function closeUserMenu() {
    const m = document.getElementById('user-dropdown-menu');
    if (m) m.classList.remove('open');
  }
  document.addEventListener('click', function(e) {
    const wrap = document.getElementById('user-dropdown-wrap');
    if (wrap && !wrap.contains(e.target)) closeUserMenu();
  });

  // ---- Terms ----
  function showTerms() {
    document.getElementById('modal-terms').classList.add('open');
  }

  // ================================================================
  // NAVIGATION
  // ================================================================

  function setupNavForRole(role) {
    const tabs     = document.getElementById('bottom-tabs');
    const navItems = document.getElementById('top-nav-items');
    const sidebar  = document.getElementById('sidebar');
    const bottomNav = document.getElementById('bottom-nav');
    const cartBtn  = document.getElementById('topnav-cart');

    const customerTabs = [
      { id:'home',      icon:'🏠', label:'Home' },
      { id:'favorites', icon:'❤️', label:'Favorites' },
      { id:'orders',    icon:'📦', label:'Orders' },
      { id:'profile',   icon:'👤', label:'Profile' }
    ];

    if (role === 'admin' || role === 'concessionaire') {
      // ---- Left sidebar for staff roles ----
      if (bottomNav)  bottomNav.style.display = 'none';
      if (cartBtn)    cartBtn.style.display    = 'none';
      if (navItems)   navItems.innerHTML        = '';

      const adminSections = [
        { label: 'Main', items: [
          { id:'home',         icon:'📊', label:'Dashboard' },
          { id:'users',        icon:'👥', label:'Users' },
          { id:'stalls',       icon:'🏪', label:'Stalls' },
          { id:'transactions', icon:'💳', label:'Transactions' }
        ]},
        { label: 'Reports', items: [
          { id:'reports',   icon:'📈', label:'Sales Reports' },
          { id:'analytics', icon:'📉', label:'Analytics' },
          { id:'scheduled', icon:'🕐', label:'Scheduled Reports' }
        ]},
        { label: 'System', items: [
          { id:'audit',     icon:'📋', label:'Audit Log' }
        ]}
      ];
      const concSections = [
        { label: 'My Stall', items: [
          { id:'home',         icon:'📊', label:'Dashboard' },
          { id:'products',     icon:'🍽️', label:'Menu' },
          { id:'orders',       icon:'📦', label:'Orders' },
          { id:'transactions', icon:'💳', label:'Transactions' },
          { id:'reports',      icon:'📈', label:'Reports' },
          { id:'users',        icon:'👥', label:'Staff' }
        ]}
      ];

      const sections = role === 'admin' ? adminSections : concSections;
      if (sidebar) {
        sidebar.style.display = 'flex';
        document.getElementById('sidebar-content').innerHTML = sections.map(sec => `
          <div class="sidebar-section">${sec.label}</div>
          ${sec.items.map(t => `
            <div class="sidebar-nav-item" data-nav="${t.id}" onclick="App.navigateTo('${t.id}')">
              <span class="sni-icon">${t.icon}</span>
              <span>${t.label}</span>
            </div>`).join('')}
        `).join('');
      }
      // No bottom tabs needed
      if (tabs) tabs.innerHTML = '';

    } else {
      // ---- Bottom nav for customers ----
      if (sidebar)    sidebar.style.display    = 'none';
      if (cartBtn)    cartBtn.style.display     = '';
      if (navItems)   navItems.innerHTML         = '';

      if (tabs) {
        tabs.innerHTML = customerTabs.map(t => `
          <button class="tab-btn" data-nav="${t.id}" onclick="App.navigateTo('${t.id}')">
            <span class="tab-icon">${t.icon}</span>
            <span>${t.label}</span>
          </button>`).join('');
      }
    }
  }

  function navigateTo(view, params) {
    state.view = view;
    saveLastView(view);
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.nav === view));
    document.querySelectorAll('.sidebar-nav-item').forEach(b => b.classList.toggle('active', b.dataset.nav === view));

    switch (view) {
      case 'home':
        if (state.role === 'admin') renderAdminDashboard();
        else if (state.role === 'concessionaire') renderConcDashboard();
        else renderCustomerHome();
        break;
      case 'stall':    renderStallView(params?.stallId); break;
      case 'cart':     renderCart(); break;
      case 'orders':
        if (state.role === 'concessionaire' || state.role === 'admin') renderStallOrders();
        else renderMyOrders();
        break;
      case 'order-detail': renderOrderDetail(params?.orderId); break;
      case 'products':  renderConcProducts(); break;
      case 'users':
        if (state.role === 'admin') renderAdminUsers();
        else renderConcUsers();
        break;
      case 'stalls':    renderAdminStalls(); break;
      case 'reports':
        if (state.role === 'admin') renderAdminReports();
        else renderConcReports();
        break;
      case 'analytics':     renderAnalytics();        break;
      case 'audit':         renderAuditLog();          break;
      case 'scheduled':     renderScheduledReports();  break;
      case 'transactions':  renderTransactions();       break;
      case 'profile':   renderProfile(); break;
      case 'favorites': renderFavorites(); break;
      case 'location':  renderLocationMap(); break;
    }
  }

  // ================================================================
  // CUSTOMER HOME
  // ================================================================

  function renderCustomerHome() {
    showPage('main');
    const el = document.getElementById('main-content');
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const name = (state.user?.name || '').split(' ')[0];

    el.innerHTML = `
      <!-- Hero -->
      <div class="hero">
        <div class="hero-content">
          <div class="hero-greeting">${greeting}, ${name}!</div>
          <div class="hero-title">What are you craving today?</div>
          <div class="hero-sub">Order from your favorite campus stalls.</div>
          <div class="hero-search">
            <input id="search-input" type="search" placeholder="Search food, drinks, merchandise...">
            <button onclick="App.doSearch()">Search</button>
          </div>
          <div class="hero-stats">
            <div class="hero-stat">🏪 <strong>${state.concessionaires.filter(s=>s.Status==='active').length}</strong> stalls open</div>
            <div class="hero-stat">🍽️ <strong>Menu</strong> ordering</div>
            <div class="hero-stat" style="cursor:pointer;" onclick="App.navigateTo('location')">📍 <strong>Campus Map</strong></div>
          </div>
        </div>
      </div>

      <div id="home-body">
        ${state.favorites.length ? `
        <div class="section-header">
          <div class="section-title">❤️ Your Favorites</div>
          <div class="section-link" onclick="App.navigateTo('favorites')">View all</div>
        </div>
        <div class="stall-grid" style="margin-bottom:20px;">${renderStallCards(state.concessionaires.filter(s=>state.favorites.includes(s.StallID)))}</div>` : ''}
        <div class="section-header">
          <div class="section-title">Campus Stalls</div>
          <div class="section-link" onclick="App.doSearch('')">View all</div>
        </div>
        <div class="stall-grid" id="stall-grid">${renderStallCards(state.concessionaires)}</div>
      </div>`;

    document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
  }

  function renderStallCards(stalls) {
    if (!stalls.length) return `<div class="empty-state"><div class="empty-icon">🏪</div><p>No stalls available yet.</p></div>`;
    return stalls.map(s => {
      const isOffline  = s.Status === 'offline';
      const isFav      = state.favorites.includes(s.StallID);
      const isExclusive = (s.Description || '').includes('[IS]') || (s.Tags || '').includes('IS');
      return `
      <div class="stall-card${isOffline ? ' is-offline' : ''}" onclick="App.navigateTo('stall',{stallId:'${s.StallID}'})">
        <button class="heart-btn${isFav?' loved':''}" onclick="event.stopPropagation();App.toggleFavorite('${s.StallID}')" title="${isFav?'Remove from favorites':'Add to favorites'}">${isFav?'❤️':'🤍'}</button>
        <div class="stall-banner">
          ${s.LogoURL
            ? `<img src="${s.LogoURL}" alt="${s.StallName}" onerror="this.parentElement.innerHTML='<div class=stall-banner-placeholder>🏪</div>'">`
            : `<div class="stall-banner-placeholder">🍽️</div>`}
          <div class="stall-open-badge" style="${isOffline?'background:var(--danger);':''}">${isOffline ? 'Offline' : 'Open'}</div>
          ${s.Rating ? `<div class="stall-rating-badge">⭐ ${Number(s.Rating).toFixed(1)}</div>` : ''}
        </div>
        <div class="stall-info">
          <div class="stall-name" style="display:flex;align-items:center;gap:6px;">
            ${s.StallName}
            ${isExclusive ? `<span class="is-badge">IS Only</span>` : ''}
          </div>
          <div class="stall-meta">
            <span>📍 ${s.Location || 'Campus'}</span>
            <span class="dot"></span>
            <span>🕐 ${s.OperatingHours || 'See stall'}</span>
          </div>
          ${s.Description && !s.Description.includes('[IS]') ? `<div class="stall-tags"><span class="stall-tag">${s.Description.split(' ').slice(0,4).join(' ')}...</span></div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function toggleFavorite(stallId) {
    const idx = state.favorites.indexOf(stallId);
    if (idx >= 0) { state.favorites.splice(idx, 1); toast('Removed from favorites.'); }
    else { state.favorites.push(stallId); toast('❤️ Added to favorites!'); }
    saveFavorites();
    // Re-render heart buttons without full page reload
    document.querySelectorAll('.heart-btn').forEach(btn => {
      const id = btn.closest('.stall-card')?.querySelector('[onclick*="navigateTo(\'stall\'"]')?.getAttribute('onclick')?.match(/stallId:'([^']+)'/)?.[1]
             || btn.getAttribute('onclick')?.match(/'([^']+)'\)/)?.[1];
      if (!id) return;
      const fav = state.favorites.includes(id);
      btn.textContent = fav ? '❤️' : '🤍';
      btn.classList.toggle('loved', fav);
      btn.title = fav ? 'Remove from favorites' : 'Add to favorites';
    });
  }

  async function doSearch(overrideQ) {
    const q = overrideQ !== undefined ? overrideQ : (document.getElementById('search-input')?.value.trim() || '');
    if (!q) { renderCustomerHome(); return; }

    const body = document.getElementById('home-body') || document.getElementById('main-content');
    if (body) body.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

    // Client-side stall search
    const stallMatches = state.concessionaires.filter(s =>
      [s.StallName, s.Description, s.Location, s.Tags || '']
        .some(f => (f||'').toLowerCase().includes(q.toLowerCase()))
    );

    try {
      const results = await call('searchProducts', q);

      // Merge: stalls + products, deduplicated
      const stallSection = stallMatches.length ? `
        <div style="padding:12px 20px 4px;font-size:13px;color:var(--text2);font-weight:600;">🏪 Stalls matching "${q}"</div>
        <div class="stall-grid" style="padding:0 16px 16px;">${renderStallCards(stallMatches)}</div>` : '';

      const productSection = results.length ? `
        <div style="padding:12px 20px 4px;font-size:13px;color:var(--text2);font-weight:600;">🍽️ Menu items matching "${q}"</div>
        <div class="product-grid">${results.map(productCardHTML).join('')}</div>` : '';

      if (body) {
        if (!stallMatches.length && !results.length) {

  function clientCacheGet(key) {
    try {
      const entry = sessionStorage.getItem(key);
      if (!entry) return null;
      const { data, ts } = JSON.parse(entry);
      if (Date.now() - ts > 5 * 60 * 1000) { sessionStorage.removeItem(key); return null; }
      return data;
    } catch(e) { return null; }
  }

  function clientCachePut(key, data) {
    try { sessionStorage.setItem(key, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
  }

  function clientCacheBust(stallId) {
    if (stallId) {
      sessionStorage.removeItem('gb_p_' + stallId);
    } else {
      Object.keys(sessionStorage).filter(k => k.startsWith('gb_p_')).forEach(k => sessionStorage.removeItem(k));
    }
  }

            ? `<img src="${p.ImageURL}" alt="${p.Name}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:52px>🍽️</span>'">`
            : `<span style="font-size:52px;">🍽️</span>`}

    if (existing) existing.qty++;
    else state.cart.push({ ...product, qty: 1 });
    updateCartBadge();
    saveCart();
    toast(`${product.Name} added to cart`, 'success');
  }

  function getCartGroups() {

      stallId:   sid,
      stallName: state.cart.find(i => i.StallID === sid).StallName,
      items:     state.cart.filter(i => i.StallID === sid)
    }));
  }

  function renderTotalsBody(stallGroups, total) {
    const multi = stallGroups.length > 1;
    const rows  = multi
      ? stallGroups.map(g => `
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--text2);">

      : '';

      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:17px;${sep}">
        <span>Total</span>
        <span style="color:var(--g800);">${peso(total)}</span>

  function updateCartTotalsDisplay() {
    const card = document.getElementById('cart-totals-card');
    if (!card) return;

    const total  = state.cart.reduce((s,i) => s + (i.Price * i.qty), 0);
    const body   = card.querySelector('.card-body');
    if (body) {
      body.innerHTML = renderTotalsBody(groups, total) + `
        <button class="btn btn-gold btn-block" style="margin-top:16px;" id="place-order-btn" onclick="App.placeOrder()" disabled>

      _checkOrderReady();
    }
  }

  function maxQty(item) {
    // Cap at concessionaire-set stock or 10, whichever is lower
    const stockLimit = (item.Stock >= 0) ? item.Stock : 10;
    return Math.min(stockLimit, 10);
  }

  function renderStallItems(items) {
    return items.map(item => {
      const max     = maxQty(item);
      const atMax   = item.qty >= max;
      const atMin   = item.qty <= 1;
      const stockLabel = item.Stock >= 0
        ? `${item.Stock} available`
        : 'In stock';
      return `
      <div class="cart-item" id="ci-${item.ProductID}">
        <div style="flex:1;min-width:0;">
          <div class="cart-item-name">${item.Name}</div>
          <div class="cart-item-price">${peso(item.Price)} each &nbsp;·&nbsp; <span style="color:var(--text3);font-size:12px;">${stockLabel}</span></div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="App.changeQty('${item.ProductID}',-1)">−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" onclick="App.changeQty('${item.ProductID}',1)"
            ${atMax ? 'disabled style="opacity:.35;cursor:not-allowed;"' : ''}
            title="${atMax ? `Max ${max} per order` : `Add more`}">+</button>
        </div>
        <div style="min-width:64px;text-align:right;">
          <div style="font-weight:600;">${peso(item.Price * item.qty)}</div>
          ${atMax ? `<div style="font-size:11px;color:var(--warn);">Max ${max}</div>` : ''}
        </div>
        <button class="cart-item-remove" onclick="App.removeCartItem('${item.ProductID}')" title="Remove item">✕</button>
      </div>`;
    }).join('');
  }

  function changeQty(productId, delta) {
    const item = state.cart.find(i => i.ProductID === productId);
    if (!item) return;

    const max     = maxQty(item);
    const newQty  = item.qty + delta;
    const stallId = item.StallID;

    if (newQty <= 0) {
      state.cart = state.cart.filter(i => i.ProductID !== productId);
    } else if (newQty > max) {
      toast(`Maximum of ${max} per order for this item.`, 'error');
      return;
    } else {
      item.qty = newQty;
    }

    updateCartBadge();
    saveCart();
    const stallItems = state.cart.filter(i => i.StallID === stallId);
    if (!stallItems.length) {
      const section = document.getElementById('cart-stall-' + stallId);
      if (section) section.remove();
      if (!state.cart.length) { renderCart(); return; }
    } else {
      const el = document.getElementById('cart-items-' + stallId);
      if (el) el.innerHTML = renderStallItems(stallItems);
      const subtotalEl = el?.parentElement?.querySelector('.stall-subtotal');
      if (subtotalEl) subtotalEl.innerHTML = `Subtotal: <strong>${peso(stallItems.reduce((s,i)=>s+i.Price*i.qty,0))}</strong>`;
    }
    updateCartTotalsDisplay();
  }

  function removeCartItem(productId) {
    state.cart = state.cart.filter(i => i.ProductID !== productId);
    updateCartBadge();
    saveCart();
    renderCart();
  }

  function removeStallFromCart(stallId) {
    state.cart = state.cart.filter(i => i.StallID !== stallId);
    updateCartBadge();
    saveCart();
    renderCart();
  }

  function _toggleRef(stallId, method) {
    const refGroup   = document.getElementById('payment-ref-group-' + stallId);
    const proofGroup = document.getElementById('payment-proof-group-' + stallId);
    const needRef    = method !== 'cash_on_pickup';
    if (refGroup)   refGroup.style.display   = needRef ? 'block' : 'none';
    if (proofGroup) proofGroup.style.display  = needRef ? 'block' : 'none';
    if (!needRef) {
      const refInput = document.getElementById('payment-ref-' + stallId);
      if (refInput) refInput.value = '';
    }
  }

  function _checkOrderReady() {
    const groups  = getCartGroups();
    const btn     = document.getElementById('place-order-btn');
    const hint    = document.getElementById('order-btn-hint');
    if (!btn) return;
    const ready = groups.every(g => {
      const method = document.getElementById('payment-method-' + g.stallId)?.value;
      if (method === 'cash_on_pickup') return true;
      const ref   = (document.getElementById('payment-ref-' + g.stallId)?.value || '').trim();
      const proof = document.getElementById('payment-proof-file-' + g.stallId);
      const hasProof = proof && proof.files && proof.files.length > 0;
      return ref.length > 0 && hasProof;
    });
    btn.disabled = !ready;
    if (hint) hint.style.display = ready ? 'none' : 'block';
  }

  function _proofSelected(stallId, input) {
    const nameBox  = document.getElementById('proof-name-' + stallId);
    const nameText = document.getElementById('proof-name-text-' + stallId);
    const uploadLabel = document.getElementById('proof-upload-label-' + stallId);
    if (input.files[0]) {
      if (nameText) nameText.textContent = '✓ ' + input.files[0].name;
      if (nameBox)  nameBox.style.display = 'flex';
      if (uploadLabel) uploadLabel.style.display = 'none';
    }
    _checkOrderReady();
  }

  function _clearProof(stallId) {
    const fileInput   = document.getElementById('payment-proof-file-' + stallId);
    const nameBox     = document.getElementById('proof-name-' + stallId);
    const nameText    = document.getElementById('proof-name-text-' + stallId);
    const uploadLabel = document.getElementById('proof-upload-label-' + stallId);
    if (fileInput)   fileInput.value = '';
    if (nameText)    nameText.textContent = '';
    if (nameBox)     nameBox.style.display = 'none';
    if (uploadLabel) uploadLabel.style.display = '';
    _checkOrderReady();
  }

  async function placeOrder() {
    const notes  = document.getElementById('order-notes')?.value.trim();
    const groups = getCartGroups();

    if (!state.cart.length) { toast('Your cart is empty.', 'error'); return; }

    for (const g of groups) {
      const method = document.getElementById('payment-method-' + g.stallId)?.value;
      const ref    = document.getElementById('payment-ref-' + g.stallId)?.value.trim();
      const proof  = document.getElementById('payment-proof-file-' + g.stallId);
      const hasProof = proof && proof.files && proof.files.length > 0;
      if (method !== 'cash_on_pickup' && !ref) {
        toast(`Enter payment reference for ${g.stallName}.`, 'error');
        return;
      }
      if (method !== 'cash_on_pickup' && !hasProof) {
        toast(`Upload proof of payment for ${g.stallName}.`, 'error');
        return;
      }
    }

    const btn = document.getElementById('place-order-btn');
    setLoading(btn, true);
    try {
      const results = await Promise.all(groups.map(async g => {
        const method = document.getElementById('payment-method-' + g.stallId)?.value;
        const ref    = document.getElementById('payment-ref-' + g.stallId)?.value.trim();
        const proofInput = document.getElementById('payment-proof-file-' + g.stallId);
        const proofFile  = proofInput && proofInput.files[0];

        let proofData = '', proofMimeType = '';
        if (method !== 'cash_on_pickup' && proofFile) {
          proofMimeType = proofFile.type || 'image/jpeg';
          const b64 = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = e => res(e.target.result.split(',')[1]); // strip data:...;base64,
            r.onerror = rej;
            r.readAsDataURL(proofFile);
          });
          proofData = b64;
        }

        return call('placeOrder', state.token, {
          stallId: g.stallId,
          items: g.items.map(i => ({ productId: i.ProductID, qty: i.qty })),
          paymentMethod: method, paymentRef: ref, notes, proofData, proofMimeType
        }).then(res => ({ ...res, stallName: g.stallName }));
      }));

      const failed = results.filter(r => !r.success);
      if (failed.length) { toast(failed[0].error || 'Some orders failed.', 'error'); return; }

      state.cart = [];
      updateCartBadge();
      saveCart();
      showOrderSuccess(results);
    } catch { toast('Failed to place orders.', 'error'); }
    finally { setLoading(btn, false); }
  }

  function _ensureProofModal() {
    // Always remove stale copies that may be nested inside content divs

    if (!document.getElementById('modal-proof-viewer')) {
      const tpl = document.createElement('div');
      tpl.innerHTML = `
        <div class="modal-overlay" id="modal-proof-viewer" style="z-index:9999;">

              <div class="loader"><div class="spinner"></div></div>

    ` : '';

    return `
      <div style="background:${bg};border:1px solid #E8F5E9;border-radius:10px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:6px;">
          <div>
            <div style="font-weight:700;font-size:14px;">${o.CustomerName}</div>

          </div>

  async function loadStallOrders(statusFilter, tab) {
    try {
      const res = await call('getStallOrders', state.token, statusFilter ? { status: statusFilter } : {});
      const list = document.getElementById('stall-orders-list');
      if (!list) return;
      const all = res.orders || [];
      const activeStatuses = ['pending','confirmed','preparing','ready'];
      const historyStatuses = ['completed','cancelled'];
      let orders = all;
      if (tab === 'active')  orders = all.filter(o => activeStatuses.includes(o.Status));
      if (tab === 'history') orders = all.filter(o => historyStatuses.includes(o.Status));
      if (!orders.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">${tab==='history'?'🗂️':'📭'}</div><p>${tab==='history'?'No order history yet.':'No active orders.'}</p></div>`;
      } else {
        // Group by customer
        const byCustomer = [];
        const seen = {};
        for (const o of orders) {
          const key = o.CustomerEmail || o.CustomerName;
          if (!seen[key]) { seen[key] = []; byCustomer.push({ name: o.CustomerName, email: o.CustomerEmail, orders: seen[key] }); }
          seen[key].push(o);
        }
        list.innerHTML = byCustomer.map((g, gi) => `
          ${gi > 0 ? `<div style="height:1px;background:var(--border);margin:14px 0;"></div>` : ''}
          <div style="font-size:12px;font-weight:700;color:var(--g700);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 2px;">
            👤 ${g.name}
          </div>
          ${g.orders.map((o, i) => concOrderCard(o, gi * 100 + i)).join('')}
        `).join('');
      }
    } catch { toast('Failed to load orders.','error'); }
  }

  function previewProductImage(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.getElementById('p-img-preview-wrap');
      if (wrap) wrap.innerHTML = `<img src="${e.target.result}" class="img-upload-preview"><div style="font-size:12px;color:var(--g800);font-weight:600;">✓ ${file.name}</div>`;
      document.getElementById('p-img').value = '';
    };
    reader.readAsDataURL(file);
  }

  function previewFromURL(url, wrapId) {
    if (!url) return;
    const wrap = document.getElementById(wrapId);
    if (wrap) wrap.innerHTML = `<img src="${url}" class="img-upload-preview" onerror="this.style.display='none'">`;
    document.getElementById('p-img-file') && (document.getElementById('p-img-file').value = '');
  }

  async function uploadImageIfNeeded() {
    const fileInput = document.getElementById('p-img-file');
    const urlInput  = document.getElementById('p-img');

    if (urlInput?.value.trim()) return urlInput.value.trim();
    if (!fileInput?.files?.[0]) return '';

    const file   = fileInput.files[0];
    const reader = new FileReader();
    const base64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    toast('Uploading image…', 'info');
    const res = await call('uploadImage', state.token, base64, file.type, file.name);
    if (!res.success) throw new Error(res.error || 'Upload failed');
    return res.url;
  }

  function previewStallImage(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.getElementById('s-logo-preview-wrap');
      if (wrap) wrap.innerHTML = `<img src="${e.target.result}" class="img-upload-preview"><div style="font-size:12px;color:var(--g800);font-weight:600;">✓ ${file.name}</div>`;
      document.getElementById('s-logo').value = '';
    };
    reader.readAsDataURL(file);
  }

  async function uploadStallImageIfNeeded() {
    const fileInput = document.getElementById('s-logo-file');
    const urlInput  = document.getElementById('s-logo');
    if (urlInput?.value.trim()) return urlInput.value.trim();
    if (!fileInput?.files?.[0]) return '';
    const file   = fileInput.files[0];
    const reader = new FileReader();
    const base64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    toast('Uploading logo…', 'info');
    const res = await call('uploadImage', state.token, base64, file.type, file.name);
    if (!res.success) throw new Error(res.error || 'Upload failed');
    return res.url;
  }

  async function doExportCSV(startId, endId) {
    const start = document.getElementById(startId).value;
    const end   = document.getElementById(endId).value;
    const btn   = event.target;
    setLoading(btn, true);
    try {
      const res = await call('exportReportCSV', state.token, start, end);
      if (!res.success) { toast(res.error,'error'); return; }
      const blob = new Blob([res.csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = res.filename; a.click();
      URL.revokeObjectURL(url);
      toast('CSV downloaded!');
    } catch { toast('Export failed.','error'); }
    finally { setLoading(btn, false); }
  }

        <div id="analytics-content"><div class="empty-state"><div class="empty-icon">📉</div><p>Select a date range and click Load.</p></div></div>
      </div>`;
  }

  async function loadAnalytics() {
    const start = document.getElementById('an-start').value;
    const end   = document.getElementById('an-end').value;
    const el    = document.getElementById('analytics-content');
    el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    try {
      const res = await call('getSalesReport', state.token, start, end);
      if (!res.success) { el.innerHTML = `<p style="color:red;">${res.error}</p>`; return; }
      const r = res.report;

      el.innerHTML = `
        <div class="stats-grid" style="margin-bottom:20px;">
          <div class="stat-card"><div class="stat-value">${r.totalOrders}</div><div class="stat-label">Total Orders</div></div>
          <div class="stat-card"><div class="stat-value" style="font-size:20px;">${peso(r.totalRevenue)}</div><div class="stat-label">Revenue</div></div>
          <div class="stat-card"><div class="stat-value" style="font-size:20px;">${peso(r.averageOrderValue)}</div><div class="stat-label">Avg Value</div></div>
        </div>
        <div class="card" style="margin-bottom:14px;">
          <div class="card-header"><h2>Daily Revenue</h2></div>
          <div class="card-body"><canvas id="chart-daily" height="120"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Top Products</h2></div>
          <div class="card-body"><canvas id="chart-products" height="120"></canvas></div>
        </div>`;

      // Load Chart.js and draw
      if (!window.Chart) {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }

      new Chart(document.getElementById('chart-daily'), {
        type: 'line',
        data: {
          labels: r.dailyRevenue.map(d => d.date),
          datasets: [{ label: 'Revenue (₱)', data: r.dailyRevenue.map(d => d.total),
            borderColor: '#1B5E20', backgroundColor: 'rgba(27,94,32,.1)', tension: .3, fill: true }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });

      new Chart(document.getElementById('chart-products'), {
        type: 'bar',
        data: {
          labels: r.topProducts.slice(0,8).map(p => p.name),
          datasets: [{ label: 'Qty Sold', data: r.topProducts.slice(0,8).map(p => p.qty),
            backgroundColor: '#1B5E20' }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
      });
    } catch(e) { el.innerHTML = '<div class="alert alert-danger">Failed to load analytics.</div>'; }
  }

  // ================================================================
  // AUDIT LOG
  // ================================================================

  async function renderAuditLog() {
    showPage('main');
    const el = document.getElementById('main-content');
    el.innerHTML = `
      <div style="padding:20px;">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">📋 Audit Log</h2>
        <div id="audit-content"><div class="loader"><div class="spinner"></div></div></div>
      </div>`;
    try {
      const res = await call('getAuditLog', state.token, 200, 0);
      const logs = res.logs || [];
      document.getElementById('audit-content').innerHTML = logs.length
        ? `<div class="table-wrap"><table>
            <tr><th>Timestamp</th><th>User</th><th>Action</th><th>Module</th><th>Record ID</th><th>Details</th></tr>
            ${logs.map(l => `
              <tr>
                <td style="font-size:12px;white-space:nowrap;">${new Date(l.Timestamp).toLocaleString('en-PH')}</td>
                <td style="font-size:12px;">${l.UserEmail}</td>
                <td><span class="audit-action ${l.Action}">${l.Action}</span></td>
                <td style="font-size:12px;">${l.Module}</td>
                <td style="font-size:11px;font-family:monospace;">${l.RecordID||'-'}</td>
                <td style="font-size:12px;max-width:220px;word-break:break-word;">${l.Details||''}</td>
              </tr>`).join('')}
           </table></div>
           <p style="font-size:12px;color:var(--text3);margin-top:8px;">Showing last ${logs.length} of ${res.total} entries.</p>`
        : '<div class="empty-state"><div class="empty-icon">📋</div><p>No audit entries yet.</p></div>';
    } catch { toast('Failed to load audit log.','error'); }
  }

  // ================================================================
  // SCHEDULED REPORTS
  // ================================================================

  async function renderScheduledReports() {
    showPage('main');
    const el = document.getElementById('main-content');
    el.innerHTML = `
      <div style="padding:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h2 style="font-size:18px;font-weight:700;">🕐 Scheduled Reports</h2>
          <button class="btn btn-primary btn-sm" onclick="App.openAddScheduledModal()">+ Add Schedule</button>
        </div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Reports are sent automatically on the configured schedule. Ensure the <strong>runScheduledReports</strong> time trigger is set up in Apps Script.</p>
        <div id="scheduled-list"><div class="loader"><div class="spinner"></div></div></div>
      </div>
      <div class="modal-overlay" id="modal-add-schedule">
        <div class="modal">
          <div class="modal-header"><h3>Add Scheduled Report</h3><button class="modal-close" onclick="App.closeModal('modal-add-schedule')">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label class="form-label">Report Name *</label><input class="form-control" id="sch-name" placeholder="e.g. Weekly Sales Summary"></div>
            <div class="form-group"><label class="form-label">Frequency *</label>
              <select class="form-control" id="sch-freq">
                <option value="daily">Daily</option>
                <option value="weekly" selected>Weekly (Mondays)</option>
                <option value="monthly">Monthly (1st of month)</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Recipients (comma-separated emails) *</label>
              <input class="form-control" id="sch-recipients" placeholder="admin@dlsl.edu.ph, owner@dlsl.edu.ph">
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="App.closeModal('modal-add-schedule')">Cancel</button>
            <button class="btn btn-primary" id="save-schedule-btn" onclick="App.saveSchedule()">Save</button>
          </div>
        </div>
      </div>`;

    try {
      const res = await call('getScheduledReports', state.token);
      const rpts = res.reports || [];
      document.getElementById('scheduled-list').innerHTML = rpts.length
        ? `<div class="table-wrap"><table>
            <tr><th>Name</th><th>Frequency</th><th>Recipients</th><th>Last Sent</th><th>Actions</th></tr>
            ${rpts.map(r => `
              <tr>
                <td><strong>${r.Name}</strong></td>
                <td style="text-transform:capitalize;">${r.Frequency}</td>
                <td style="font-size:12px;">${r.Recipients}</td>
                <td style="font-size:12px;">${r.LastSent||'Never'}</td>
                <td><button class="btn btn-danger btn-sm" onclick="App.deleteSchedule('${r.ReportID}')">Delete</button></td>
              </tr>`).join('')}
           </table></div>`
        : '<div class="empty-state"><div class="empty-icon">🕐</div><p>No scheduled reports. Add one above.</p></div>';
    } catch { toast('Failed to load scheduled reports.','error'); }
  }

  function openAddScheduledModal() { openModal('modal-add-schedule'); }

  async function saveSchedule() {
    const btn = document.getElementById('save-schedule-btn');
    setLoading(btn, true);
    try {
      const res = await call('saveScheduledReport', state.token, {
        name: document.getElementById('sch-name').value,
        frequency: document.getElementById('sch-freq').value,
        recipients: document.getElementById('sch-recipients').value
      });
      if (res.success) { closeModal('modal-add-schedule'); toast('Schedule saved!'); renderScheduledReports(); }
      else toast(res.error,'error');
    } catch { toast('Failed.','error'); }
    finally { setLoading(btn, false); }
  }

  async function deleteSchedule(reportId) {
    if (!confirm('Delete this scheduled report?')) return;
    const res = await call('deleteScheduledReport', state.token, reportId).catch(()=>null);
    if (res?.success) { toast('Deleted.'); renderScheduledReports(); }
    else toast('Failed.','error');
  }

  // ================================================================
  // PROFILE
  // ================================================================

  function renderProfile() {
    showPage('main');
    const u = state.user || {};
    document.getElementById('main-content').innerHTML = `
      <div style="padding:20px;">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:20px;">My Profile</h2>
        <div class="card">
          <div style="background:linear-gradient(135deg,var(--g900),var(--g700));padding:32px;text-align:center;">
            <div style="width:72px;height:72px;border-radius:50%;background:var(--gold);margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--g900);font-weight:800;">
              ${(u.name||'?')[0].toUpperCase()}
            </div>
            <div style="color:#fff;font-size:18px;font-weight:700;margin-top:12px;">${u.name}</div>
            <div style="color:#a5d6a7;font-size:14px;">${u.email}</div>
            <div style="margin-top:8px;">${statusBadge('approved')} <span style="color:#fff;font-size:13px;margin-left:4px;">${u.role}</span></div>
          </div>
          <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div><div class="form-label">ID Number</div><div style="font-weight:600;">${u.idNumber||'—'}</div></div>
              <div><div class="form-label">Phone</div><div style="font-weight:600;">${u.phone||'—'}</div></div>
            </div>
          </div>
        </div>
        <button class="btn btn-danger btn-block" style="margin-top:20px;" onclick="App.doLogout()">Sign Out</button>
      </div>`;
  }

  // ================================================================
  // Public API
  // ================================================================
  return {
    init, submitEmail, submitOTP, resendOTP, renderLoginStep1, renderLoginStep2, doLogout,
    toggleUserMenu, closeUserMenu, showTerms,
    bootFromLogin: function(res) {
      state.token = res.token;
      if (!res.role && res.user) res = Object.assign({}, res, { role: res.user.role });
      bootSession(res);
    },
    navigateTo, doSearch, filterByCategory,
    addToCart, changeQty, removeCartItem, removeStallFromCart, placeOrder,
    _toggleRef, _checkOrderReady, _proofSelected, _clearProof,
    cancelOrder, viewProof, closeProofModal, renderTransactions, _txnFilter, openRatingModal, selectStar, submitRating,
    updateStatus, verifyPayment, openRejectPaymentModal, submitRejectPayment, filterStallOrders, renderStallOrders,
    toggleStallOnline, openHoursModal,
    toggleFavorite, renderFavorites, renderMyOrders, renderLocationMap,
    openProductModal, saveProduct, toggleAvailability, deleteProduct,
    previewProductImage, previewFromURL,
    approveProduct,
    openAddUserModal, saveUser, deactivateUser, _toggleStallField,
    openEditUserModal, saveEditUser, _toggleEditStallField,
    renderConcUsers, openConcAddUserModal, saveConcStaff,
    fixHeaders,
    openAddStallModal, saveStall, approveStall, previewStallImage,
    loadReport, renderConcReports, loadConcReport,
    doExportCSV, doPrintReport, doEmailReport,
    renderAnalytics, loadAnalytics,
    renderAuditLog,
    renderScheduledReports, openAddScheduledModal, saveSchedule, deleteSchedule,
    openModal, closeModal
  };
})();

if (!window.__GBDynamicLoad) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', App.init);
  } else {
    App.init();
  }
}
</script>
