<script>
// ============================================================
// DLSL Ordering App — Scripts.html
// SPA client logic: routing, state, API calls
// ============================================================

var App = (() => {
  // ---- State ----
  let state = {
    token: null, user: null, role: null, stallData: null,
    cart: [], cartStallId: null, cartStallName: null,
    view: 'login', subview: null,
    concessionaires: [], products: [], orders: [],
    currentStall: null, selectedOrder: null,
    pendingEmail: null, pendingName: null
  };

  // ---- Persist token ----
  function loadToken()  { return sessionStorage.getItem('dlsl_ordering_token'); }
  function saveToken(t) { sessionStorage.setItem('dlsl_ordering_token', t); }
  function clearToken() { sessionStorage.removeItem('dlsl_ordering_token'); }

  // ---- GAS caller ----
  function call(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        [fn](...args);
    });
  }

  // ---- Toast ----
  function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ---- Show/hide pages ----
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const el = document.getElementById('page-' + id);
    if (el) el.classList.add('active');
  }

  // ---- Modals ----
  function openModal(id) { document.getElementById(id)?.classList.add('open'); }
  function closeModal(id){ document.getElementById(id)?.classList.remove('open'); }

  // ---- Loading overlay ----
  function setLoading(el, loading) {
    if (!el) return;
    if (loading) { el._orig = el.innerHTML; el.disabled = true; el.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;"></div>'; }
    else         { el.disabled = false; el.innerHTML = el._orig || ''; }
  }

  // ---- Format ----
  function peso(n) { return '₱' + Number(n).toFixed(2); }
  function relTime(iso) {
    const d = new Date(iso), now = Date.now(), diff = now - d;
    if (diff < 60000)    return 'Just now';
    if (diff < 3600000)  return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return d.toLocaleDateString('en-PH', { month:'short', day:'numeric' });
  }
  function statusBadge(s) {
    const labels = { pending:'Pending', confirmed:'Confirmed', preparing:'Preparing',
                     ready:'Ready', completed:'Completed', cancelled:'Cancelled',
                     approved:'Approved', rejected:'Rejected' };
    return `<span class="badge badge-${s}">${labels[s]||s}</span>`;
  }
  function stars(n, max=5) {
    return Array.from({length:max}, (_,i) => `<span style="color:${i<n?'#C9A84C':'#e0e0e0'}">★</span>`).join('');
  }

  // ================================================================
  // AUTH
  // ================================================================

  async function init() {
    const t = loadToken();
    if (t) {
      try {
        const res = await call('getBootData', t);
        if (res.success) {
          state.token = t;
          bootSession(res);
          return;
        }
      } catch {}
      clearToken();
    }
    showPage('login');
    showEmailStep();
  }

  function bootSession(res) {
    state.user = res.user;
    state.role = res.role;
    state.stallData = res.stallData;
    state.concessionaires = res.concessionaires || [];
    document.getElementById('topnav-username').textContent = res.user.name;
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('bottom-nav').style.display = 'block';
    if (res.role === 'admin' || res.role === 'concessionaire') {
      document.getElementById('topnav-cart').style.display = 'none';
    }
    setupNavForRole(res.role);
    navigateTo('home');
  }

  // Show email step (step 1)
  function showEmailStep() {
    document.getElementById('login-step-email').style.display = '';
    document.getElementById('login-step-otp').style.display = 'none';
    document.getElementById('login-error-box').innerHTML = '';
    const emailInput = document.getElementById('login-email');
    emailInput.value = '';
    emailInput.onkeydown = function(e) { if (e.key === 'Enter') submitEmail(); };
    document.getElementById('login-submit-btn').onclick = submitEmail;
    emailInput.focus();
  }

  // Show OTP step (step 2)
  function showOTPStep(email, name) {
    state.pendingEmail = email;
    state.pendingName  = name;
    document.getElementById('otp-email-display').textContent = email;
    document.getElementById('otp-error-box').innerHTML = '';
    for (let i = 0; i < 6; i++) { var el = document.getElementById('otp-' + i); if (el) el.value = ''; }
    document.getElementById('login-step-email').style.display = 'none';
    document.getElementById('login-step-otp').style.display = '';
    document.getElementById('otp-submit-btn').onclick = doVerifyOTP;
    document.getElementById('resend-btn').onclick = doResendOTP;
    document.getElementById('otp-back-btn').onclick = showEmailStep;
    setupOTPInputs();
  }

  function setupOTPInputs() {
    for (let i = 0; i < 6; i++) {
      const el = document.getElementById(`otp-${i}`);
      if (!el) continue;
      const clone = el.cloneNode(true);
      el.parentNode.replaceChild(clone, el);
      const fresh = document.getElementById(`otp-${i}`);
      fresh.addEventListener('input', e => {
        e.target.value = e.target.value.replace(/\D/g,'').slice(0,1);
        if (e.target.value && i < 5) document.getElementById(`otp-${i+1}`)?.focus();
      });
      fresh.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) document.getElementById(`otp-${i-1}`)?.focus();
      });
      fresh.addEventListener('paste', e => {
        e.preventDefault();
        const digits = (e.clipboardData.getData('text').replace(/\D/g,'')).slice(0,6);
        digits.split('').forEach((d,j) => { const inp = document.getElementById(`otp-${j}`); if (inp) inp.value = d; });
        document.getElementById(`otp-${Math.min(digits.length, 5)}`)?.focus();
      });
    }
    document.getElementById('otp-0')?.focus();
  }

  async function submitEmail() {
    const email = document.getElementById('login-email')?.value.trim();
    if (!email) { toast('Please enter your email.','error'); return; }

    const errBox = document.getElementById('login-error-box');
    if (errBox) errBox.innerHTML = '';

    const btn = document.getElementById('login-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; btn.style.opacity = '.8'; }
    try {
      const res = await call('requestAccess', email);
      if (res.success) {
        showOTPStep(email, res.name);
      } else {
        if (errBox) errBox.innerHTML = `<div class="lf-error">${res.error}</div>`;
      }
    } catch (e) {
      if (errBox) errBox.innerHTML = `<div class="lf-error">Connection error. Please try again.</div>`;
    }
    finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Continue →'; btn.style.opacity = ''; }
    }
  }

  async function doVerifyOTP() {
    const email = state.pendingEmail;
    const code  = Array.from({length:6}, (_,i) => document.getElementById(`otp-${i}`)?.value || '').join('');
    if (code.length < 6) { toast('Enter all 6 digits.','error'); return; }

    const errBox = document.getElementById('otp-error-box');
    errBox.innerHTML = '';
    const btn = document.getElementById('otp-submit-btn');
    setLoading(btn, true);
    try {
      const res = await call('verifyOTP', email, code);
      if (res.success) {
        saveToken(res.token);
        state.token = res.token;
        bootSession(res);
      } else {
        errBox.innerHTML = `<div class="lf-error">${res.error}</div>`;
      }
    } catch { toast('Connection error. Please try again.','error'); }
    finally { setLoading(btn, false); }
  }

  async function doResendOTP() {
    const btn = document.getElementById('resend-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
    try {
      const res = await call('resendOTP', state.pendingEmail);
      if (res.success) {
        toast('New OTP sent!','success');
        for (let i = 0; i < 6; i++) { const el = document.getElementById(`otp-${i}`); if (el) el.value = ''; }
        document.getElementById('otp-error-box').innerHTML = '';
        document.getElementById('otp-0')?.focus();
      } else { toast(res.error,'error'); }
    } catch { toast('Connection error.','error'); }
    finally { if (btn) { btn.disabled = false; btn.textContent = 'Resend OTP'; } }
  }

  // Legacy alias kept in case any inline onclick references it
  function renderLoginStep1() { showEmailStep(); }

  async function doLogout() {
    if (state.token) await call('logout', state.token).catch(()=>{});
    state = { token:null, user:null, role:null, stallData:null, cart:[], cartStallId:null, cartStallName:null, view:'login', subview:null, concessionaires:[], products:[], orders:[], currentStall:null, selectedOrder:null, pendingEmail:null, pendingName:null };
    clearToken();
    document.getElementById('main-nav').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    document.getElementById('topnav-cart').style.display = '';
    showPage('login');
    showEmailStep();
  }

  // ================================================================
  // NAVIGATION
  // ================================================================

  function setupNavForRole(role) {
    const tabs = document.getElementById('bottom-tabs');
    const navItems = document.getElementById('top-nav-items');
    if (!tabs || !navItems) return;

    const customerTabs = [
      { id:'home',    icon:'🏠', label:'Home' },
      { id:'orders',  icon:'📦', label:'Orders' },
      { id:'profile', icon:'👤', label:'Profile' }
    ];
    const concTabs = [
      { id:'home',     icon:'📊', label:'Dashboard' },
      { id:'products', icon:'🍽️', label:'Menu' },
      { id:'orders',   icon:'📦', label:'Orders' }
    ];
    const adminTabs = [
      { id:'home',    icon:'📊', label:'Dashboard' },
      { id:'users',   icon:'👥', label:'Users' },
      { id:'stalls',  icon:'🏪', label:'Stalls' },
      { id:'reports', icon:'📈', label:'Reports' }
    ];

    const tabList = role === 'admin' ? adminTabs : role === 'concessionaire' ? concTabs : customerTabs;

    tabs.innerHTML = tabList.map(t => `
      <button class="tab-btn" data-nav="${t.id}" onclick="App.navigateTo('${t.id}')">
        <span class="tab-icon">${t.icon}</span>
        <span>${t.label}</span>
      </button>`).join('');

    navItems.innerHTML = tabList.map(t =>
      `<button class="topnav-btn" onclick="App.navigateTo('${t.id}')">${t.label}</button>`
    ).join('');
  }

  function navigateTo(view, params) {
    state.view = view;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.nav === view));

    switch (view) {
      case 'home':
        if (state.role === 'admin') renderAdminDashboard();
        else if (state.role === 'concessionaire') renderConcDashboard();
        else renderCustomerHome();
        break;
      case 'stall':    renderStallView(params?.stallId); break;
      case 'cart':     renderCart(); break;
      case 'orders':
        if (state.role === 'concessionaire' || state.role === 'admin') renderStallOrders();
        else renderMyOrders();
        break;
      case 'order-detail': renderOrderDetail(params?.orderId); break;
      case 'products': renderConcProducts(); break;
      case 'users':    renderAdminUsers(); break;
      case 'stalls':   renderAdminStalls(); break;
      case 'reports':  renderAdminReports(); break;
      case 'profile':  renderProfile(); break;
    }
  }

  // ================================================================
  // CUSTOMER HOME
  // ================================================================

  function renderCustomerHome() {
    showPage('main');
    const el = document.getElementById('main-content');
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const name = (state.user?.name || '').split(' ')[0];

    el.innerHTML = `
      <!-- Hero -->
      <div class="hero">
        <div class="hero-content">
          <div class="hero-greeting">${greeting}, ${name}!</div>
          <div class="hero-title">What are you craving today?</div>
          <div class="hero-sub">Order from your favorite DLSL campus stalls.</div>
          <div class="hero-search">
            <input id="search-input" type="search" placeholder="Search food, drinks, merchandise...">
            <button onclick="App.doSearch()">Search</button>
          </div>
          <div class="hero-stats">
            <div class="hero-stat">🏪 <strong>${state.concessionaires.length}</strong> stalls open</div>
            <div class="hero-stat">🍽️ <strong>57+</strong> menu items</div>
            <div class="hero-stat">⚡ <strong>Order & Pickup</strong></div>
          </div>
        </div>
      </div>

      <div id="home-body">
        <div class="section-header">
          <div class="section-title">Campus Stalls</div>
          <div class="section-link" onclick="App.doSearch('')">View all</div>
        </div>
        <div class="stall-grid" id="stall-grid">${renderStallCards(state.concessionaires)}</div>
      </div>`;

    document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
  }

  function renderStallCards(stalls) {
    if (!stalls.length) return `<div class="empty-state"><div class="empty-icon">🏪</div><p>No stalls available yet.</p></div>`;
    return stalls.map(s => `
      <div class="stall-card" onclick="App.navigateTo('stall',{stallId:'${s.StallID}'})">
        <div class="stall-banner">
          ${s.LogoURL
            ? `<img src="${s.LogoURL}" alt="${s.StallName}" onerror="this.parentElement.innerHTML='<div class=stall-banner-placeholder>🏪</div>'">`
            : `<div class="stall-banner-placeholder">🍽️</div>`}
          <div class="stall-open-badge">Open</div>
          ${s.Rating ? `<div class="stall-rating-badge">⭐ ${Number(s.Rating).toFixed(1)}</div>` : ''}
        </div>
        <div class="stall-info">
          <div class="stall-name">${s.StallName}</div>
          <div class="stall-meta">
            <span>📍 ${s.Location || 'Campus'}</span>
            <span class="dot"></span>
            <span>🕐 ${s.OperatingHours || 'See stall'}</span>
          </div>
          ${s.Description ? `<div class="stall-tags"><span class="stall-tag">${s.Description.split(' ').slice(0,4).join(' ')}...</span></div>` : ''}
        </div>
      </div>`).join('');
  }

  async function doSearch() {
    const q = document.getElementById('search-input')?.value.trim();
    if (!q) { renderCustomerHome(); return; }

    const body = document.getElementById('home-body');
    if (body) body.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

    try {
      const results = await call('searchProducts', q);
      if (body) body.innerHTML = results.length
        ? `<div style="padding:12px 20px;font-size:13px;color:var(--text2);">${results.length} result(s) for "<strong>${q}</strong>"</div>
           <div class="product-grid">${results.map(productCardHTML).join('')}</div>`
        : `<p style="padding:30px 20px;color:var(--text3);text-align:center;">No results for "<strong>${q}</strong>"</p>`;
    } catch { toast('Search failed.','error'); }
  }

  // ================================================================
  // STALL VIEW
  // ================================================================

  async function renderStallView(stallId) {
    showPage('main');
    const el = document.getElementById('main-content');
    el.innerHTML = `<div class="loader"><div class="spinner"></div><p>Loading menu...</p></div>`;

    try {
      const stall    = state.concessionaires.find(s => s.StallID === stallId);
      const products = await call('getProductsByStall', stallId);
      state.currentStall = stall;

      const categories = [...new Set(products.map(p => p.Category).filter(Boolean))];
      const productsJSON = JSON.stringify(products).replace(/`/g, '\\`');

      el.innerHTML = `
        <div class="stall-detail-hero">
          ${stall?.LogoURL
            ? `<img src="${stall.LogoURL}" alt="${stall?.StallName}" onerror="this.style.display='none'">`
            : `<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--g900),var(--g600));display:flex;align-items:center;justify-content:center;font-size:80px;">🍽️</div>`}
          <button class="stall-detail-back" onclick="App.navigateTo('home')">←</button>
          <div class="stall-detail-overlay">
            <div class="stall-detail-name">${stall?.StallName || 'Stall'}</div>
            <div class="stall-detail-meta">
              <span>📍 ${stall?.Location || 'Campus'}</span>
              <span>🕐 ${stall?.OperatingHours || 'See stall'}</span>
              ${stall?.Rating ? `<span>⭐ ${Number(stall.Rating).toFixed(1)} (${stall.TotalRatings} reviews)</span>` : '<span>⭐ New stall</span>'}
            </div>
          </div>
        </div>
        <div class="chip-scroll" style="padding-top:16px;">
          <div class="chip active" data-cat="" onclick="App.filterByCategory(this,'',\`${productsJSON}\`)">🍽️ All</div>
          ${categories.map(c => `<div class="chip" data-cat="${c}" onclick="App.filterByCategory(this,'${c.replace(/'/g,"\\'")}',\`${productsJSON}\`)">${c}</div>`).join('')}
        </div>
        <div class="product-grid" id="product-grid">
          ${products.length ? products.map(productCardHTML).join('') : '<div class="empty-state"><div class="empty-icon">🍽️</div><p>No menu items yet.</p></div>'}
        </div>`;
    } catch { toast('Failed to load stall.','error'); el.innerHTML = '<p style="padding:20px;">Error loading stall.</p>'; }
  }

  function filterByCategory(chip, cat, productsJson) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    let products = typeof productsJson === 'string' ? JSON.parse(productsJson) : productsJson;
    if (cat) products = products.filter(p => p.Category === cat);
    const grid = document.getElementById('product-grid');
    if (grid) grid.innerHTML = products.map(productCardHTML).join('') || '<p style="padding:20px;color:var(--text3);">No products in this category.</p>';
  }

  function productCardHTML(p) {
    const lowStock   = p.Stock >= 0 && p.Stock <= 5;
    const unavailable = !p.IsAvailable || p.Stock === 0;
    const dataAttr   = JSON.stringify(p).replace(/"/g, '&quot;');
    const inCart     = state.cart.find(i => i.ProductID === p.ProductID);
    return `
      <div class="product-card${unavailable ? ' product-unavailable' : ''}">
        <div class="product-thumb">
          ${p.ImageURL
            ? `<img src="${p.ImageURL}" alt="${p.Name}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:52px>🍽️</span>'">`
            : `<span style="font-size:52px;">🍽️</span>`}
        </div>
        ${lowStock && !unavailable ? `<div class="product-stock-low">⚡ ${p.Stock} left</div>` : ''}
        ${unavailable ? `<div class="product-unavail-tag">Unavailable</div>` : ''}
        <div class="product-info">
          <div class="product-name">${p.Name}</div>
          <div class="product-cat">${p.Category || ''}</div>
          <div class="product-footer">
            <div class="product-price">${peso(p.Price)}</div>
            ${!unavailable ? `<button class="product-add-btn" onclick="event.stopPropagation();App.addToCart(${dataAttr})" title="Add to cart">
              ${inCart ? `<span style="font-size:13px;font-weight:800;">${inCart.qty}</span>` : '+'}
            </button>` : ''}
          </div>
        </div>
      </div>`;
  }

  // ================================================================
  // CART
  // ================================================================

  function addToCart(product) {
    // Enforce single-stall cart
    if (state.cartStallId && state.cartStallId !== product.StallID) {
      if (!confirm(`Your cart has items from ${state.cartStallName}. Clear cart and add from ${product.StallName}?`)) return;
      state.cart = [];
    }
    state.cartStallId   = product.StallID;
    state.cartStallName = product.StallName;

    const existing = state.cart.find(i => i.ProductID === product.ProductID);
    if (existing) existing.qty++;
    else state.cart.push({ ...product, qty: 1 });

    updateCartBadge();
    toast(`${product.Name} added to cart`, 'success');
  }

  function updateCartBadge() {
    const badge = document.getElementById('cart-badge');
    const total = state.cart.reduce((s, i) => s + i.qty, 0);
    if (badge) { badge.textContent = total; badge.style.display = total ? 'flex' : 'none'; }
  }

  function renderCart() {
    showPage('main');
    const el = document.getElementById('main-content');

    if (!state.cart.length) {
      el.innerHTML = `
        <div style="padding:20px;">
          <button class="btn btn-ghost btn-sm" onclick="App.navigateTo('home')">← Back</button>
          <div style="text-align:center;padding:60px 20px;">
            <div style="font-size:64px;">🛒</div>
            <p style="color:var(--text2);margin-top:12px;">Your cart is empty.</p>
            <button class="btn btn-primary" style="margin-top:16px;" onclick="App.navigateTo('home')">Browse Stalls</button>
          </div>
        </div>`;
      return;
    }

    const subtotal = state.cart.reduce((s,i) => s + (i.Price * i.qty), 0);

    el.innerHTML = `
      <div style="padding:20px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <button class="btn btn-ghost btn-sm" onclick="App.navigateTo('home')">← Back</button>
          <h2 style="font-size:18px;font-weight:700;">Your Cart</h2>
        </div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-header"><h2>🏪 ${state.cartStallName}</h2></div>
          <div class="card-body" id="cart-items">${renderCartItems()}</div>
        </div>
        <div class="card" style="margin-bottom:16px;">
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Payment Method</label>
              <select class="form-control" id="payment-method">
                <option value="cash_on_pickup">Cash on Pickup</option>
                <option value="gcash">GCash</option>
                <option value="maya">Maya</option>
              </select>
            </div>
            <div id="payment-ref-group" style="display:none;" class="form-group">
              <label class="form-label">Reference Number</label>
              <input class="form-control" id="payment-ref" placeholder="Enter GCash/Maya reference number">
            </div>
            <div class="form-group">
              <label class="form-label">Notes (optional)</label>
              <input class="form-control" id="order-notes" placeholder="Special instructions...">
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
              <span style="color:var(--text2);">Subtotal</span>
              <span>${peso(subtotal)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-weight:700;font-size:17px;padding-top:12px;border-top:1px solid var(--border);">
              <span>Total</span>
              <span style="color:var(--g800);">${peso(subtotal)}</span>
            </div>
            <button class="btn btn-gold btn-block" style="margin-top:16px;" id="place-order-btn" onclick="App.placeOrder()">Place Order</button>
          </div>
        </div>
      </div>`;

    document.getElementById('payment-method').addEventListener('change', function() {
      const refGroup = document.getElementById('payment-ref-group');
      refGroup.style.display = this.value !== 'cash_on_pickup' ? 'block' : 'none';
    });
  }

  function maxQty(item) {
    // Cap at concessionaire-set stock or 10, whichever is lower
    const stockLimit = (item.Stock >= 0) ? item.Stock : 10;
    return Math.min(stockLimit, 10);
  }

  function renderCartItems() {
    return state.cart.map(item => {
      const max     = maxQty(item);
      const atMax   = item.qty >= max;
      const atMin   = item.qty <= 1;
      const stockLabel = item.Stock >= 0
        ? `${item.Stock} available`
        : 'In stock';
      return `
      <div class="cart-item" id="ci-${item.ProductID}">
        <div style="flex:1;min-width:0;">
          <div class="cart-item-name">${item.Name}</div>
          <div class="cart-item-price">${peso(item.Price)} each &nbsp;·&nbsp; <span style="color:var(--text3);font-size:12px;">${stockLabel}</span></div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="App.changeQty('${item.ProductID}',-1)" ${atMin ? '' : ''}>−</button>
          <span class="qty-display">${item.qty}</span>
          <button class="qty-btn" onclick="App.changeQty('${item.ProductID}',1)"
            ${atMax ? 'disabled style="opacity:.35;cursor:not-allowed;"' : ''}
            title="${atMax ? `Max ${max} per order` : `Add more`}">+</button>
        </div>
        <div style="min-width:64px;text-align:right;">
          <div style="font-weight:600;">${peso(item.Price * item.qty)}</div>
          ${atMax ? `<div style="font-size:11px;color:var(--warn);">Max ${max}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function changeQty(productId, delta) {
    const item = state.cart.find(i => i.ProductID === productId);
    if (!item) return;

    const max    = maxQty(item);
    const newQty = item.qty + delta;

    if (newQty <= 0) {
      state.cart = state.cart.filter(i => i.ProductID !== productId);
      if (!state.cart.length) { state.cartStallId = null; state.cartStallName = null; }
    } else if (newQty > max) {
      toast(`Maximum of ${max} per order for this item.`, 'error');
      return;
    } else {
      item.qty = newQty;
    }

    updateCartBadge();
    const el = document.getElementById('cart-items');
    if (el) el.innerHTML = renderCartItems();
    else renderCart();
  }

  async function placeOrder() {
    const method = document.getElementById('payment-method')?.value;
    const ref    = document.getElementById('payment-ref')?.value.trim();
    const notes  = document.getElementById('order-notes')?.value.trim();

    if (!state.cart.length) { toast('Your cart is empty.','error'); return; }
    if (method !== 'cash_on_pickup' && !ref) { toast('Please enter your payment reference number.','error'); return; }

    const btn = document.getElementById('place-order-btn');
    setLoading(btn, true);
    try {
      const res = await call('placeOrder', state.token, {
        stallId: state.cartStallId,
        items: state.cart.map(i => ({ productId: i.ProductID, qty: i.qty })),
        paymentMethod: method, paymentRef: ref, notes
      });

      if (res.success) {
        state.cart = []; state.cartStallId = null; state.cartStallName = null;
        updateCartBadge();
        showOrderSuccess(res.orderId, res.pickupCode, res.total);
      } else { toast(res.error,'error'); }
    } catch { toast('Failed to place order.','error'); }
    finally { setLoading(btn, false); }
  }

  function previewProductImage(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.getElementById('p-img-preview-wrap');
      if (wrap) wrap.innerHTML = `<img src="${e.target.result}" class="img-upload-preview"><div style="font-size:12px;color:var(--g800);font-weight:600;">✓ ${file.name}</div>`;
      document.getElementById('p-img').value = '';
    };
    reader.readAsDataURL(file);
  }

  function previewFromURL(url, wrapId) {
    if (!url) return;
    const wrap = document.getElementById(wrapId);
    if (wrap) wrap.innerHTML = `<img src="${url}" class="img-upload-preview" onerror="this.style.display='none'">`;
    document.getElementById('p-img-file') && (document.getElementById('p-img-file').value = '');
  }

  async function uploadImageIfNeeded() {
    const fileInput = document.getElementById('p-img-file');
    const urlInput  = document.getElementById('p-img');

    if (urlInput?.value.trim()) return urlInput.value.trim();
    if (!fileInput?.files?.[0]) return '';

    const file   = fileInput.files[0];
    const reader = new FileReader();
    const base64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });

    toast('Uploading image…', 'info');
    const res = await call('uploadImage', state.token, base64, file.type, file.name);
    if (!res.success) throw new Error(res.error || 'Upload failed');
    return res.url;
  }

  function previewStallImage(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { toast('Image must be under 5MB.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.getElementById('s-logo-preview-wrap');
      if (wrap) wrap.innerHTML = `<img src="${e.target.result}" class="img-upload-preview"><div style="font-size:12px;color:var(--g800);font-weight:600;">✓ ${file.name}</div>`;
      document.getElementById('s-logo').value = '';
    };
    reader.readAsDataURL(file);
  }

  async function uploadStallImageIfNeeded() {
    const fileInput = document.getElementById('s-logo-file');
    const urlInput  = document.getElementById('s-logo');
    if (urlInput?.value.trim()) return urlInput.value.trim();
    if (!fileInput?.files?.[0]) return '';
    const file   = fileInput.files[0];
    const reader = new FileReader();
    const base64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(file);
    });
    toast('Uploading logo…', 'info');
    const res = await call('uploadImage', state.token, base64, file.type, file.name);
    if (!res.success) throw new Error(res.error || 'Upload failed');
    return res.url;
  }

// Wire all login form events via addEventListener so they close over the
// IIFE scope — no global/window lookup needed, works in GAS sandbox.
(function() {
  function wireLoginForms() {
    var submitBtn = document.getElementById('login-submit-btn');
    if (submitBtn) {
      submitBtn.addEventListener('click', function() { App.submitEmail(); });
    }

    var emailInput = document.getElementById('login-email');
    if (emailInput) {
      emailInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') App.submitEmail(); });
    }

    var otpBtn = document.getElementById('otp-submit-btn');
    if (otpBtn) {
      otpBtn.addEventListener('click', function() { App.doVerifyOTP(); });
    }

    var backBtn = document.getElementById('otp-back-btn');
    if (backBtn) {
      backBtn.addEventListener('click', function() { App.showEmailStep(); });
    }

    var resendBtn = document.getElementById('resend-btn');
    if (resendBtn) {
      resendBtn.addEventListener('click', function() { App.doResendOTP(); });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      wireLoginForms();
      App.init();
    });
  } else {
    wireLoginForms();
    App.init();
  }
})();
